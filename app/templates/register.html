{% extends "base.html" %}

{% block title %}学生注册{% endblock %}

{% block content %}
<div class="wide-card">
    <div class="card shadow-sm">
        <div class="card-body p-4">
            <h3 class="mb-4">学生注册</h3>
            <form method="post">
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label">用户名</label>
                        <input class="form-control" type="text" name="username" required>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">密码</label>
                        <input class="form-control" type="password" name="password" required>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">真实姓名</label>
                        <input class="form-control" type="text" name="real_name">
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">性别</label>
                        <select class="form-control" name="gender">
                            <option value="">请选择</option>
                            <option value="男">男</option>
                            <option value="女">女</option>
                        </select>
                    </div>
                    <div class="col-md-4 mb-3">
                        <label class="form-label">年龄</label>
                        <input class="form-control" type="number" name="age">
                    </div>
                    <div class="col-md-4 mb-3">
                        <label class="form-label">身高 cm</label>
                        <input class="form-control" type="number" step="0.1" name="height">
                    </div>
                    <div class="col-md-4 mb-3">
                        <label class="form-label">体重 kg</label>
                        <input class="form-control" type="number" step="0.1" name="weight">
                    </div>
                    <div class="col-md-4 mb-3">
                        <label class="form-label">运动基础</label>
                        <select class="form-control" name="fitness_level">
                            <option value="">请选择</option>
                            <option value="新手">新手</option>
                            <option value="一般">一般</option>
                            <option value="有经验">有经验</option>
                        </select>
                    </div>
                    <div class="col-md-4 mb-3">
                        <label class="form-label">每周训练天数</label>
                        <input class="form-control" type="number" name="weekly_days" min="0" max="7">
                    </div>
                    <div class="col-md-4 mb-3">
                        <label class="form-label">健身目标</label>
                        <select class="form-control" name="goal_type">
                            <option value="">请选择</option>
                            <option value="减脂">减脂</option>
                            <option value="增肌">增肌</option>
                            <option value="保持体态">保持体态</option>
                            <option value="提升体能">提升体能</option>
                        </select>
                    </div>
                </div>
                <button class="btn btn-success" type="submit">注册</button>
                <a class="btn btn-outline-secondary ms-2" href="{{ url_for('student_login') }}">已有账号，去登录</a>
            </form>
        </div>
    </div>
</div>
{% endblock %}

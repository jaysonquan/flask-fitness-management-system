{% extends "base.html" %}

{% block title %}新增食物{% endblock %}

{% block content %}
<div class="wide-card">
    <div class="card shadow-sm">
        <div class="card-body p-4">
            <h3 class="mb-4">新增食物</h3>
            <form method="post">
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label">食物名称</label>
                        <input class="form-control" type="text" name="food_name" required>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">类别</label>
                        <input class="form-control" type="text" name="category">
                    </div>
                    <div class="col-md-3 mb-3">
                        <label class="form-label">热量 kcal/100g</label>
                        <input class="form-control" type="number" step="0.1" name="calories">
                    </div>
                    <div class="col-md-3 mb-3">
                        <label class="form-label">蛋白质</label>
                        <input class="form-control" type="number" step="0.1" name="protein">
                    </div>
                    <div class="col-md-3 mb-3">
                        <label class="form-label">碳水</label>
                        <input class="form-control" type="number" step="0.1" name="carbohydrate">
                    </div>
                    <div class="col-md-3 mb-3">
                        <label class="form-label">脂肪</label>
                        <input class="form-control" type="number" step="0.1" name="fat">
                    </div>
                    <div class="col-12 mb-3">
                        <label class="form-label">备注</label>
                        <input class="form-control" type="text" name="remarks">
                    </div>
                </div>
                <button class="btn btn-success" type="submit">保存食物</button>
                <a class="btn btn-outline-secondary ms-2" href="{{ url_for('foods') }}">返回食物库</a>
            </form>
        </div>
    </div>
</div>
{% endblock %}

{% extends "base.html" %}

{% block title %}管理员后台{% endblock %}

{% block content %}
<h2 class="mb-4">管理员后台</h2>

<div class="row">
    <div class="col-md-6">
        <div class="card shadow-sm mb-4">
            <div class="card-body">
                <h4 class="mb-3">管理功能</h4>
                <div class="section-actions">
                    <a class="btn btn-success" href="{{ url_for('foods') }}">食物库管理</a>
                    <a class="btn btn-outline-secondary" href="{{ url_for('logout') }}">退出后台</a>
                </div>
                <p class="text-muted mb-0">食物库热量数据会用于图片识别饮食记录和热量估算。</p>
            </div>
        </div>
    </div>
    <div class="col-md-6">
        <div class="card shadow-sm mb-4">
            <div class="card-body">
                <h4 class="mb-3">系统亮点</h4>
                <ul class="data-list">
                    <li>学生训练、饮食、身体指标管理</li>
                    <li>管理员食物库维护</li>
                    <li>KMeans 机器学习分析</li>
                    <li>图片识别饮食记录与热量估算</li>
                </ul>
            </div>
        </div>
    </div>
</div>
{% endblock %}

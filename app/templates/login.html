{% extends "base.html" %}

{% block title %}学生登录{% endblock %}

{% block content %}
<div class="form-card">
    <div class="card shadow-sm">
        <div class="card-body p-4">
            <h3 class="text-center mb-4">学生登录</h3>
            <form method="post">
                <div class="mb-3">
                    <label class="form-label">用户名</label>
                    <input class="form-control" type="text" name="username" placeholder="请输入用户名" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">密码</label>
                    <input class="form-control" type="password" name="password" placeholder="请输入密码" required>
                </div>
                <button class="btn btn-primary w-100" type="submit">登录</button>
            </form>
            <div class="text-center mt-3">
                <a href="{{ url_for('student_register') }}">还没有账号，去注册</a>
                <span class="mx-2">|</span>
                <a href="{{ url_for('index') }}">返回首页</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% extends "base.html" %}

{% block title %}新增身体指标{% endblock %}

{% block content %}
<div class="wide-card">
    <div class="card shadow-sm">
        <div class="card-body p-4">
            <h3 class="mb-4">新增身体指标</h3>
            <form method="post">
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label">记录日期</label>
                        <input class="form-control" type="date" name="record_date" required>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">体重 kg</label>
                        <input class="form-control" type="number" step="0.1" name="weight" required>
                    </div>
                    <div class="col-md-4 mb-3">
                        <label class="form-label">BMI</label>
                        <input class="form-control" type="number" step="0.1" name="bmi">
                    </div>
                    <div class="col-md-4 mb-3">
                        <label class="form-label">腰围 cm</label>
                        <input class="form-control" type="number" step="0.1" name="waist">
                    </div>
                    <div class="col-md-4 mb-3">
                        <label class="form-label">臀围 cm</label>
                        <input class="form-control" type="number" step="0.1" name="hip">
                    </div>
                    <div class="col-12 mb-3">
                        <label class="form-label">备注</label>
                        <input class="form-control" type="text" name="remarks">
                    </div>
                </div>
                <button class="btn btn-warning" type="submit">保存身体指标</button>
                <a class="btn btn-outline-secondary ms-2" href="{{ url_for('body_records') }}">返回列表</a>
            </form>
        </div>
    </div>
</div>
{% endblock %}

{% extends "base.html" %}

{% block title %}新增饮食记录{% endblock %}

{% block content %}
<div class="wide-card">
    <div class="card shadow-sm">
        <div class="card-body p-4">
            <h3 class="mb-4">新增饮食记录</h3>
            <form method="post">
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label">饮食日期</label>
                        <input class="form-control" type="date" name="record_date" required>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">食物名称</label>
                        <input class="form-control" type="text" name="food_name" required>
                    </div>
                    <div class="col-md-4 mb-3">
                        <label class="form-label">数量 g</label>
                        <input class="form-control" type="number" step="0.1" name="quantity">
                    </div>
                    <div class="col-md-4 mb-3">
                        <label class="form-label">总热量 kcal</label>
                        <input class="form-control" type="number" step="0.1" name="total_calories">
                    </div>
                    <div class="col-md-4 mb-3">
                        <label class="form-label">餐次</label>
                        <select class="form-control" name="meal_type">
                            <option value="">请选择</option>
                            <option value="早餐">早餐</option>
                            <option value="午餐">午餐</option>
                            <option value="晚餐">晚餐</option>
                            <option value="加餐">加餐</option>
                        </select>
                    </div>
                    <div class="col-12 mb-3">
                        <label class="form-label">备注</label>
                        <input class="form-control" type="text" name="remarks">
                    </div>
                </div>
                <button class="btn btn-success" type="submit">保存饮食记录</button>
                <a class="btn btn-outline-secondary ms-2" href="{{ url_for('diet_records') }}">返回列表</a>
            </form>
        </div>
    </div>
</div>
{% endblock %}

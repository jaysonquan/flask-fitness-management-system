{% extends "base.html" %}

{% block title %}新增训练记录{% endblock %}

{% block content %}
<div class="wide-card">
    <div class="card shadow-sm">
        <div class="card-body p-4">
            <h3 class="mb-4">新增训练记录</h3>
            <form method="post">
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label">训练日期</label>
                        <input class="form-control" type="date" name="workout_date" required>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">训练项目</label>
                        <input class="form-control" type="text" name="workout_item" placeholder="如：跑步、篮球、深蹲" required>
                    </div>
                    <div class="col-md-4 mb-3">
                        <label class="form-label">时长 / 分钟</label>
                        <input class="form-control" type="number" name="duration_minutes" min="0">
                    </div>
                    <div class="col-md-4 mb-3">
                        <label class="form-label">完成情况</label>
                        <select class="form-control" name="completion_status">
                            <option value="">请选择</option>
                            <option value="已完成">已完成</option>
                            <option value="部分完成">部分完成</option>
                            <option value="未完成">未完成</option>
                        </select>
                    </div>
                    <div class="col-md-4 mb-3">
                        <label class="form-label">消耗热量 / kcal</label>
                        <input class="form-control" type="number" step="0.1" name="calories_burned" min="0">
                    </div>
                    <div class="col-12 mb-3">
                        <label class="form-label">备注</label>
                        <input class="form-control" type="text" name="remarks">
                    </div>
                </div>
                <button class="btn btn-primary" type="submit">保存记录</button>
                <a class="btn btn-outline-secondary ms-2" href="{{ url_for('workout_records') }}">返回列表</a>
            </form>
        </div>
    </div>
</div>
{% endblock %}

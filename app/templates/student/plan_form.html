{% extends "base.html" %}

{% block title %}新增健身计划{% endblock %}

{% block content %}
<div class="wide-card">
    <div class="card shadow-sm">
        <div class="card-body p-4">
            <h3 class="mb-4">新增健身计划</h3>
            <form method="post">
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label">计划名称</label>
                        <input class="form-control" type="text" name="plan_name" required>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">每周训练次数</label>
                        <input class="form-control" type="number" name="weekly_frequency" min="1" max="7">
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">健身目标</label>
                        <select class="form-control" name="goal_type">
                            <option value="">请选择</option>
                            <option value="减脂">减脂</option>
                            <option value="增肌">增肌</option>
                            <option value="保持体态">保持体态</option>
                            <option value="提升体能">提升体能</option>
                        </select>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">适用水平</label>
                        <select class="form-control" name="level_type">
                            <option value="">请选择</option>
                            <option value="新手">新手</option>
                            <option value="一般">一般</option>
                            <option value="有经验">有经验</option>
                        </select>
                    </div>
                    <div class="col-12 mb-3">
                        <label class="form-label">计划内容</label>
                        <textarea class="form-control" name="content" rows="6"></textarea>
                    </div>
                    <div class="col-12 mb-3">
                        <label class="form-label">备注</label>
                        <input class="form-control" type="text" name="remarks">
                    </div>
                </div>
                <button class="btn btn-primary" type="submit">保存计划</button>
                <a class="btn btn-outline-secondary ms-2" href="{{ url_for('workout_plans') }}">返回列表</a>
            </form>
        </div>
    </div>
</div>
{% endblock %}
